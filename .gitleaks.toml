[extend]
useDefault = true

[allowlist]
description = "허용 목록 — 테스트·문서에서 의도적으로 사용한 더미 값"
paths = [
  "tests/",
  "docs/",
]
regexes = [
  # 더미/예시 값 허용
  '''(?i)(example|dummy|placeholder|test|fake)[-_]?(key|token|secret)''',
]

[[rules]]
description = "Anthropic API Key"
id = "anthropic-api-key"
regex = '''sk-ant-[a-zA-Z0-9\-_]{32,}'''
tags = ["key", "anthropic"]

[[rules]]
description = "Generic High-Entropy Secret"
id = "generic-api-key"
regex = '''(?i)(api[_-]?key|apikey|api[_-]?secret)\s*[=:]\s*["']?[a-zA-Z0-9/+=]{20,}'''
entropy = 3.5
tags = ["key", "generic"]
