apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  labels:
    app: ai-coding-best-practice
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-coding-best-practice
  template:
    metadata:
      labels:
        app: ai-coding-best-practice
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: app
          image: ghcr.io/trustedoss/ai-coding-best-practice:latest
          ports:
            - containerPort: 8080
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: app
spec:
  selector:
    app: ai-coding-best-practice
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
