# AI 보안 코드 리뷰 — 기본 비활성화
#
# 활성화 방법:
# 1. GitHub repository Settings > Secrets > ANTHROPIC_API_KEY 등록
# 2. 아래 `if: false` 를 제거
#
# 주의: PR diff가 Anthropic 서버로 전송됩니다.
# 사내 보안 정책 확인 후 활성화하세요.
# FP(오탐)율이 높으므로 빌드 차단이 아닌 PR 코멘트 용도로만 사용합니다.

name: AI Security Review (Optional)

on:
  pull_request:
    branches: [main]

jobs:
  ai-review:
    if: false  # 활성화하려면 이 줄 제거
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.js' '*.ts' '*.go' '*.java' '*.rb' \
            | head -c 8000 > diff.txt
          echo "size=$(wc -c < diff.txt)" >> $GITHUB_OUTPUT

      - name: AI Security Review
        if: steps.diff.outputs.size > 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic -q
          python3 << 'EOF'
          import anthropic, pathlib

          diff = pathlib.Path("diff.txt").read_text()
          client = anthropic.Anthropic()

          response = client.messages.create(
            model="claude-opus-4-7",
            max_tokens=1024,
            messages=[{
              "role": "user",
              "content": (
                "아래 코드 변경에서 보안 취약점을 검토하라.\n"
                "탐지 대상: SQL 인젝션, 인증·인가 우회, 민감 정보 노출, "
                "입력값 검증 누락, 안전하지 않은 역직렬화.\n"
                "발견 시: 파일명·라인·위험도(High/Medium)·설명 형식으로 출력.\n"
                "발견 없으면: 'PASS' 한 줄만 출력.\n\n"
                f"```diff\n{diff}\n```"
              )
            }]
          )

          result = response.content[0].text
          pathlib.Path("review_result.txt").write_text(result)
          print(result)
          EOF

      - name: Post PR comment
        if: steps.diff.outputs.size > 0
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const result = fs.readFileSync('review_result.txt', 'utf8');
            if (result.trim() === 'PASS') return;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## AI 보안 코드 리뷰\n\n${result}\n\n> AI 생성 리뷰입니다. 오탐 가능성이 있으니 맥락을 고려해 판단하세요.`
            });
